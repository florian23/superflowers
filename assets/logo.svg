<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <defs>
    <!-- Gradient for flower petals -->
    <linearGradient id="petal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="petal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="petal3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="stem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Flower 1 (large, left) -->
  <g transform="translate(90, 100)">
    <!-- Stem -->
    <path d="M0,30 Q-5,80 5,130" stroke="url(#stem)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M-2,90 Q-30,70 -35,85 Q-25,95 -2,95" fill="url(#leaf)"/>
    <!-- Petals -->
    <ellipse cx="0" cy="-22" rx="14" ry="26" fill="url(#petal1)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-22" rx="14" ry="26" fill="url(#petal2)" transform="rotate(60)"/>
    <ellipse cx="0" cy="-22" rx="14" ry="26" fill="url(#petal3)" transform="rotate(120)"/>
    <ellipse cx="0" cy="-22" rx="14" ry="26" fill="url(#petal1)" transform="rotate(180)"/>
    <ellipse cx="0" cy="-22" rx="14" ry="26" fill="url(#petal2)" transform="rotate(240)"/>
    <ellipse cx="0" cy="-22" rx="14" ry="26" fill="url(#petal3)" transform="rotate(300)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="12" fill="url(#center)"/>
    <!-- Code bracket in center -->
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#92400E">&lt;/&gt;</text>
  </g>

  <!-- Flower 2 (small, accent) -->
  <g transform="translate(55, 80) scale(0.5)">
    <path d="M0,25 Q3,60 -5,100" stroke="url(#stem)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <ellipse cx="0" cy="-18" rx="11" ry="20" fill="url(#petal2)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-18" rx="11" ry="20" fill="url(#petal3)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-18" rx="11" ry="20" fill="url(#petal1)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-18" rx="11" ry="20" fill="url(#petal2)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-18" rx="11" ry="20" fill="url(#petal3)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="9" fill="url(#center)"/>
  </g>

  <!-- Flower 3 (tiny, bud) -->
  <g transform="translate(130, 65) scale(0.35)">
    <path d="M0,20 Q5,50 0,90" stroke="url(#stem)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M5,60 Q25,45 28,58 Q20,65 5,63" fill="url(#leaf)"/>
    <ellipse cx="0" cy="-15" rx="10" ry="18" fill="url(#petal3)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-15" rx="10" ry="18" fill="url(#petal1)" transform="rotate(90)"/>
    <ellipse cx="0" cy="-15" rx="10" ry="18" fill="url(#petal2)" transform="rotate(180)"/>
    <ellipse cx="0" cy="-15" rx="10" ry="18" fill="url(#petal3)" transform="rotate(270)"/>
    <circle cx="0" cy="0" r="7" fill="url(#center)"/>
  </g>

  <!-- Text: "superflowers" -->
  <text x="175" y="125" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" letter-spacing="-2">
    <tspan fill="#7C3AED">super</tspan><tspan fill="#059669">flowers</tspan>
  </text>

  <!-- Tagline -->
  <text x="178" y="160" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#6B7280" letter-spacing="0.5">
    composable skills for coding agents
  </text>
</svg>
